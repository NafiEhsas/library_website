<!DOCTYPE html>
<html lang="ps">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>د ګډون فورم - احسان کتابتون</title>
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="register.css">

</head>

<body dir="rtl">

    <header>
        <div id="logo_container">
            <img src="./assets/logos/Ehsas Library logo design.png" alt="logo">
        </div>
        <div id="ad_container">
            <span>یو کتاب رانیسي او په پچه اچونه کي ګډون وکړي</span>
        </div>

        <div id="buttons_container">
            <button id="modeBtn">
                <img src="./assets/headerIcons/sun.png" alt="" width="18" height="18">
            </button>

            <button>
                <img src="./assets/profile/profile.png" alt="" width="30" height="30">
            </button>
            <button>
                <a href="login.html">
                    <img src="./assets/icons/logout.png" alt="" width="30" height="30">
                </a>
            </button>
        </div>
    </header>

    <nav class="navbar">
        <div class="nav-container">
            <ul class="nav-links">
                <li><a href="index.html">کور پاڼه</a></li>
                <li><a href="books.html">کتابونه</a></li>
                <li><a href="news.html">خبرونه</a></li>
                <li><a href="instructor.html">لارښود</a></li>
                <li><a href="visitUs.html">لیدنه وکړي</a></li>
                <li><a href="about.html">زموږ په اړه</a></li>
                <li><a href="register.html">غړیتوب</a></li>
            </ul>
        </div>
    </nav>
    <main>
        <div class="register-container">
            <div class="register-header">
                <h1> رجستر فورم</h1>
                <p>مهرباني وکړئ لاندې فورمه ډکه کړي</p>
            </div>

            <form action="">
                <div class="row">
                    <div class="form-group">
                        <label>نوم</label>
                        <input name="name" type="text" placeholder="خپل نوم دلته ولیکئ" id="nameInput">
                        <small id="nameAlert"></small>
                    </div>

                    <div class="form-group">
                        <label>تخلص</label>
                        <input type="text" name="lname" placeholder="خپل تخلص دلته ولیکئ" id="lNameInput">
                        <small id="lNameAlert"></small>
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>بریښنالیک</label>
                        <input type="text" name="email" placeholder="ایمیل ادرس ولیکی" id="emailInput">
                        <small id="emailAlert"></small>
                    </div>
                    <div class="form-group">
                        <label>شماره تلیفون</label>
                        <input type="tel" name="phone" placeholder="ټلیفون نمبر" id="phoneInput">
                        <small id="phoneAlert"></small>
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>د تذکرې نمبر</label>
                        <input type="text" placeholder="تذکري نمبر" id="tazkiraInput">
                        <small id="tazkiraAlert"></small>
                    </div>

                    <div class="form-group">
                        <label>دنده</label>
                        <select name="job">
                            <option value="">دنده وټاکئ</option>
                            <option value="student">محصل</option>
                            <option value="teacher">ښوونکی</option>
                            <option value="doctor">ډاکټر</option>
                            <option value="engineer">انجینر</option>
                            <option value="businessman">سوداګر</option>
                            <option value="writer">لیکوال</option>
                            <option value="retire">متقاعد</option>
                            <option value="more">نور</option>
                        </select>
                        <small id="jobAlert"></small>
                    </div>

                </div>

                <div class="row">

                    <div class="form-group">
                        <label>جنس</label>
                        <div class="radio-group">
                            <label>
                                <input type="radio" name="gender" value="male" checked> نارینه
                            </label>
                            <label>
                                <input type="radio" name="gender" value="female"> ښځینه
                            </label>
                        </div>
                    </div>
                </div>




                <button type="submit" class="register-btn" id="formBtn">ګډون وکړئ</button>
            </form>
        </div>
    </main>

</body>

<script src="register.js"></script>
<script src="theme.js"></script>
</html>
